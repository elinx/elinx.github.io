<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 580" font-family="system-ui,-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">

  <defs>
    <!-- Arrow markers -->
    <marker id="arr-g1" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L12,5 L0,9" fill="#66BB6A"/>
    </marker>
    <marker id="arr-g2" markerWidth="14" markerHeight="11" refX="14" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0.5 L14,5.5 L0,10.5" fill="#2E7D32"/>
    </marker>
    <marker id="arr-a" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L12,5 L0,9" fill="#FB8C00"/>
    </marker>
    <marker id="arr-r1" markerWidth="14" markerHeight="11" refX="14" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0.5 L14,5.5 L0,10.5" fill="#C62828"/>
    </marker>
    <marker id="arr-r2" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L12,5 L0,9" fill="#EF5350"/>
    </marker>

    <!-- Subtle shadow for clock -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="580" fill="#ffffff" rx="10"/>

  <!-- Title -->
  <text x="350" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#263238">趋势分类：时钟方向与斜率</text>
  <text x="350" y="60" text-anchor="middle" font-size="12.5" fill="#78909C">观察斜率三要素：时钟方向 · 固定时长 · 对数坐标</text>

  <!-- Clock circle with shadow -->
  <circle cx="250" cy="310" r="205" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>

  <!-- Left half dim overlay (no trend sectors here) -->
  <path d="M250,105 A205,205 0 0,0 250,515 Z" fill="#fafafa" opacity="0.5"/>

  <!-- ====== Sector fills ====== -->

  <!-- 1: 加速上涨 (12:00 → 1:00, 0°→30°) -->
  <path d="M250,310 L250,105 A205,205 0 0,1 352.5,132.5 Z" fill="#66BB6A" opacity="0.18"/>

  <!-- 2: 稳定上涨 (1:00 → 2:30, 30°→75°) *** THE GOOD STUFF *** -->
  <path d="M250,310 L352.5,132.5 A205,205 0 0,1 448.0,257.0 Z" fill="#2E7D32" opacity="0.22"/>

  <!-- 3: 横向整理 (2:30 → 3:30, 75°→105°) -->
  <path d="M250,310 L448.0,257.0 A205,205 0 0,1 448.0,363.0 Z" fill="#FB8C00" opacity="0.18"/>

  <!-- 4: 稳定下跌 (3:30 → 5:00, 105°→150°) *** THE GOOD STUFF *** -->
  <path d="M250,310 L448.0,363.0 A205,205 0 0,1 352.5,487.5 Z" fill="#C62828" opacity="0.22"/>

  <!-- 5: 加速下跌 (5:00 → 6:00, 150°→180°) -->
  <path d="M250,310 L352.5,487.5 A205,205 0 0,1 250,515 Z" fill="#EF5350" opacity="0.18"/>

  <!-- ====== Sector boundary lines ====== -->
  <line x1="250" y1="310" x2="250" y2="105" stroke="#BDBDBD" stroke-width="0.8" stroke-dasharray="5,4"/>
  <line x1="250" y1="310" x2="352.5" y2="132.5" stroke="#BDBDBD" stroke-width="0.8" stroke-dasharray="5,4"/>
  <line x1="250" y1="310" x2="448.0" y2="257.0" stroke="#BDBDBD" stroke-width="0.8" stroke-dasharray="5,4"/>
  <line x1="250" y1="310" x2="448.0" y2="363.0" stroke="#BDBDBD" stroke-width="0.8" stroke-dasharray="5,4"/>
  <line x1="250" y1="310" x2="352.5" y2="487.5" stroke="#BDBDBD" stroke-width="0.8" stroke-dasharray="5,4"/>
  <line x1="250" y1="310" x2="250" y2="515" stroke="#BDBDBD" stroke-width="0.8" stroke-dasharray="5,4"/>

  <!-- ====== Price line illustrations (thin, inside sectors) ====== -->

  <!-- 1: 加速上涨 - curve going steeper -->
  <polyline points="270.7,232.7 278.5,200.7 286.3,164.7 294.0,125.8"
    fill="none" stroke="#66BB6A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- 2: 稳定上涨 - steady upward line -->
  <polyline points="313.5,261.3 337.3,238.0 361.1,214.8 384.9,191.5"
    fill="none" stroke="#2E7D32" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>

  <!-- 3: 横向整理 - wavy flat line -->
  <polyline points="330,310 345,302 360,316 375,300 390,318 405,302 420,314"
    fill="none" stroke="#FB8C00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- 4: 稳定下跌 - steady downward line -->
  <polyline points="313.5,358.7 337.3,382.0 361.1,405.2 384.9,428.5"
    fill="none" stroke="#C62828" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>

  <!-- 5: 加速下跌 - curve going steeper down -->
  <polyline points="270.7,387.3 278.5,419.2 286.3,455.2 294.0,494.2"
    fill="none" stroke="#EF5350" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- ====== Midline arrows ====== -->

  <!-- 1: 加速上涨 (mid 15°) - thinner, warning -->
  <line x1="250" y1="310" x2="299" y2="127" stroke="#66BB6A" stroke-width="2" marker-end="url(#arr-g1)"/>

  <!-- 2: 稳定上涨 (mid 52.5°) - thick, the main event -->
  <line x1="250" y1="310" x2="401" y2="194" stroke="#2E7D32" stroke-width="3" marker-end="url(#arr-g2)"/>

  <!-- 3: 横向整理 (mid 90°) -->
  <line x1="250" y1="310" x2="440" y2="310" stroke="#FB8C00" stroke-width="2" marker-end="url(#arr-a)"/>

  <!-- 4: 稳定下跌 (mid 127.5°) - thick, the main event -->
  <line x1="250" y1="310" x2="401" y2="426" stroke="#C62828" stroke-width="3" marker-end="url(#arr-r1)"/>

  <!-- 5: 加速下跌 (mid 165°) - thinner, warning -->
  <line x1="250" y1="310" x2="299" y2="493" stroke="#EF5350" stroke-width="2" marker-end="url(#arr-r2)"/>

  <!-- Center dot -->
  <circle cx="250" cy="310" r="5" fill="#37474F"/>

  <!-- ====== Clock number labels ====== -->
  <text x="250" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#37474F">12</text>
  <text x="362" y="122" text-anchor="start" font-size="12" fill="#90A4AE">1</text>
  <text x="458" y="252" text-anchor="start" font-size="12" fill="#90A4AE">2</text>
  <text x="464" y="306" text-anchor="start" font-size="15" font-weight="700" fill="#37474F">3</text>
  <text x="458" y="375" text-anchor="start" font-size="12" fill="#90A4AE">4</text>
  <text x="362" y="504" text-anchor="start" font-size="12" fill="#90A4AE">5</text>
  <text x="250" y="533" text-anchor="middle" font-size="15" font-weight="700" fill="#37474F">6</text>

  <!-- Left side hours (dimmed) -->
  <text x="138" y="122" text-anchor="end" font-size="12" fill="#CFD8DC">11</text>
  <text x="42" y="252" text-anchor="end" font-size="12" fill="#CFD8DC">10</text>
  <text x="36" y="306" text-anchor="end" font-size="15" font-weight="700" fill="#B0BEC5">9</text>
  <text x="42" y="375" text-anchor="end" font-size="12" fill="#CFD8DC">8</text>
  <text x="138" y="504" text-anchor="end" font-size="12" fill="#CFD8DC">7</text>

  <!-- ====== Trend labels (outside circle with connectors) ====== -->

  <!-- 1: 加速上涨 -->
  <line x1="303" y1="112" x2="340" y2="95" stroke="#66BB6A" stroke-width="1" opacity="0.6"/>
  <circle cx="340" cy="95" r="2" fill="#66BB6A"/>
  <text x="348" y="91" text-anchor="start" font-size="15" font-weight="700" fill="#66BB6A">加速上涨</text>
  <text x="348" y="109" text-anchor="start" font-size="11.5" fill="#78909C">1:00 → 12:00</text>
  <text x="348" y="125" text-anchor="start" font-size="11" fill="#FF8A65">⚠ 极易反转</text>

  <!-- 2: 稳定上涨 -->
  <line x1="413" y1="175" x2="465" y2="158" stroke="#2E7D32" stroke-width="1" opacity="0.6"/>
  <circle cx="465" cy="158" r="2" fill="#2E7D32"/>
  <text x="473" y="154" text-anchor="start" font-size="15" font-weight="700" fill="#2E7D32">稳定上涨</text>
  <text x="473" y="172" text-anchor="start" font-size="11.5" fill="#78909C">2:30 → 1:00</text>
  <text x="473" y="188" text-anchor="start" font-size="11" fill="#43A047">✓ 真正的大行情</text>

  <!-- 3: 横向整理 -->
  <line x1="458" y1="310" x2="490" y2="310" stroke="#FB8C00" stroke-width="1" opacity="0.6"/>
  <circle cx="490" cy="310" r="2" fill="#FB8C00"/>
  <text x="498" y="306" text-anchor="start" font-size="15" font-weight="700" fill="#FB8C00">横向整理</text>
  <text x="498" y="324" text-anchor="start" font-size="11.5" fill="#78909C">2:30 → 3:30</text>
  <text x="498" y="340" text-anchor="start" font-size="11" fill="#FFA726">⏳ 等突破 / 防假突破</text>

  <!-- 4: 稳定下跌 -->
  <line x1="413" y1="445" x2="465" y2="462" stroke="#C62828" stroke-width="1" opacity="0.6"/>
  <circle cx="465" cy="462" r="2" fill="#C62828"/>
  <text x="473" y="458" text-anchor="start" font-size="15" font-weight="700" fill="#C62828">稳定下跌</text>
  <text x="473" y="476" text-anchor="start" font-size="11.5" fill="#78909C">3:30 → 5:00</text>
  <text x="473" y="492" text-anchor="start" font-size="11" fill="#E53935">✓ 真正的大行情</text>

  <!-- 5: 加速下跌 -->
  <line x1="303" y1="508" x2="340" y2="525" stroke="#EF5350" stroke-width="1" opacity="0.6"/>
  <circle cx="340" cy="525" r="2" fill="#EF5350"/>
  <text x="348" y="521" text-anchor="start" font-size="15" font-weight="700" fill="#EF5350">加速下跌</text>
  <text x="348" y="539" text-anchor="start" font-size="11.5" fill="#78909C">5:00 → 6:00</text>
  <text x="348" y="555" text-anchor="start" font-size="11" fill="#FF8A65">⚠ 极易反转</text>

  <!-- ====== Bottom note ====== -->
  <text x="350" y="575" text-anchor="middle" font-size="10.5" fill="#B0BEC5">粗箭头 = 值得参与的大行情 ｜ 细箭头 = 需警惕的加速/横盘 ｜ 内部细线 = 价格走势示意</text>

</svg>
